<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Prevents mobile browsers from introducing artificial borders or zooming bugs -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bhoji</title>
  <style>
    /* Crucial: Removes the default browser white margin/padding on mobile */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevents double scrolling bars */
      background-color: #0b1528; /* Matches your app's dark navy background color */
    }

    /* Sets the iframe to truly fill the mobile viewport smoothly */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbzHXrr_1rysj5oHfC1xKwFbIG9geMKfFrLFqOhQLsm3vH40AJ5akdMb_KwGjj7Kf8Vf/exec" 
    allow="geolocation"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    frameborder="0">
  </iframe>

</body>
</html>
